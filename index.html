<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>AKT Bo'limi | Smart Control System</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --success: #2ecc71; --danger: #e74c3c; --warning: #f1c40f; --light: #f8f9fa; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #e0e4e8; margin: 0; padding: 10px; }
        .container { max-width: 1300px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); }
        h2 { text-align: center; color: var(--primary); border-bottom: 3px solid var(--accent); padding-bottom: 10px; }
        .setup-area { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; background: var(--light); padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #ddd; }
        select, input, .btn { padding: 12px; border-radius: 6px; border: 1px solid #ccc; font-size: 14px; outline: none; }
        .btn { cursor: pointer; border: none; font-weight: bold; color: white; transition: 0.3s; }
        .btn-add { background: var(--success); min-width: 120px; }
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 15px; }
        .staff-card { background: white; border-radius: 10px; padding: 15px; border-top: 5px solid var(--accent); box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .staff-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .task-item { padding: 12px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #eee; position: relative; font-size: 14px; }
        .priority-high { border-left: 8px solid var(--danger); background: #fff5f5; }
        .priority-mid { border-left: 8px solid var(--warning); background: #fffdf0; }
        .priority-low { border-left: 8px solid var(--success); background: #f5fff8; }
        @keyframes blink { 0% { background: #fff; } 50% { background: #ffeb3b; } 100% { background: #fff; } }
        .urgent-blink { animation: blink 1.5s infinite; border: 2px solid var(--danger) !important; }
        .status-info { font-size: 11px; margin-top: 5px; color: #7f8c8d; }
        .comment-area { font-size: 12px; background: #d4edda; color: #155724; padding: 8px; border-radius: 4px; margin-top: 8px; border-left: 3px solid var(--success); }
        .actions { display: flex; gap: 5px; margin-top: 10px; }
        .btn-sm { padding: 6px 12px; font-size: 11px; border-radius: 4px; cursor: pointer; border: none; color: white; }
        .stats-badge { font-size: 12px; background: var(--primary); color: white; padding: 2px 8px; border-radius: 10px; }
    </style>
</head>
<body>
<audio id="notifSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>
<div class="container">
    <h2>🚀 AKT BO'LIMI: SMART NAZORAT</h2>
    <div class="setup-area">
        <select id="staffSelect"></select>
        <select id="fromSelect">
            <option value="Hamrayev Omon">Hamrayev Omon (Boshliq)</option>
            <option value="Jumayev Nurbek">Jumayev Nurbek (Etakchi muhandis)</option>
        </select>
        <select id="prioritySelect">
            <option value="high">🔴 Shoshilinch</option>
            <option value="mid">🟡 O'rtacha</option>
            <option value="low">🟢 Oddiy</option>
        </select>
        <input type="text" id="taskInput" placeholder="Vazifa mazmuni...">
        <button class="btn btn-add" onclick="addTask()">Qo'shish +</button>
    </div>
    <div style="margin-bottom: 15px; display: flex; gap: 10px;">
        <button class="btn" style="background:var(--primary)" onclick="window.print()">🖨️ Chop etish</button>
        <button class="btn" style="background:var(--danger)" onclick="clearAll()">🗑️ Kunni tozalash</button>
    </div>
    <div id="dashboard" class="dashboard"></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBuukb__qunhIE8270Tm_lYrUDA6z8gjp0",
        authDomain: "akt-bo-limi-vazifalari.firebaseapp.com",
        databaseURL: "https://akt-bo-limi-vazifalari-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "akt-bo-limi-vazifalari",
        storageBucket: "akt-bo-limi-vazifalari.firebasestorage.app",
        messagingSenderId: "906385201997",
        appId: "1:906385201997:web:4b4b13a9d0fa683bdaf504"
    };

    const botToken = "7987132574:AAFc0E48WZwZNkj1N6MxCq_CKoMt6elgYOs";
    const adminChatId = "286676339"; 

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    const staffData = {
        "Hamrayev Omon": { role: "Bo'lim boshlig'i", pass: "777" },
        "Jumayev Nurbek": { role: "Etakchi muhandis", pass: "555" },
        "Qosimov Elbek": { role: "Dasturchi muhandis", pass: "111" },
        "Xojibayev Javoxit": { role: "Dasturchi muhandis", pass: "222" },
        "Ismoilov Xasan": { role: "Dasturchi muhandis", pass: "333" },
        "Xo'jamqulov Baxtiyor": { role: "Muhandis", pass: "444" },
        "Ismatov Temur": { role: "Muhandis", pass: "666" }
    };

    function sendTelegram(message) {
        const url = `https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${adminChatId}&text=${encodeURIComponent(message)}&parse_mode=HTML`;
        fetch(url).catch(e => console.error("Telegram error:", e));
    }

    const select = document.getElementById('staffSelect');
    Object.keys(staffData).forEach(name => {
        let opt = document.createElement('option');
        opt.value = name; opt.innerText = "Kimga: " + name;
        select.appendChild(opt);
    });

    let isFirstLoad = true;
    database.ref('tasks').on('value', (snapshot) => {
        const data = snapshot.val();
        if (!isFirstLoad && data) document.getElementById('notifSound').play().catch(() => {});
        render(data);
        isFirstLoad = false;
    });

    function render(data) {
        const dashboard = document.getElementById('dashboard');
        dashboard.innerHTML = '';
        const now = Date.now();
        Object.keys(staffData).forEach(name => {
            const card = document.createElement('div');
            card.className = 'staff-card';
            let tasksHtml = '';
            let total = 0, doneCount = 0;
            if (data) {
                Object.keys(data).forEach(id => {
                    const t = data[id];
                    if (t.owner === name) {
                        total++; if(t.done) doneCount++;
                        const isLate = !t.readTime && !t.done && (now - t.timestamp > 1800000);
                        tasksHtml += `
                            <div class="task-item priority-${t.priority} ${t.done ? 'completed' : ''} ${isLate ? 'urgent-blink' : ''}">
                                <b>📤 ${t.from}</b> <small>⏰ ${t.startTime}</small><br>
                                <span style="display:block; margin:5px 0">${t.text}</span>
                                <div class="status-info">
                                    ${t.readTime ? `👁️ O'qildi: ${t.readTime}` : '<b style="color:red">🌑 Yangi</b>'}
                                    ${t.done ? `<br>✅ Bajarildi: ${t.finishTime}` : ''}
                                </div>
                                ${t.comment ? `<div class="comment-area"><b>Natija:</b> ${t.comment}</div>` : ''}
                                <div class="actions">
                                    ${!t.readTime ? `<button class="btn-sm" style="background:#3498db" onclick="secureAction('${id}', 'read', '${name}')">O'qidim</button>` : ''}
                                    ${t.readTime && !t.done ? `<button class="btn-sm" style="background:#2ecc71" onclick="secureAction('${id}', 'finish', '${name}')">Bajarildi</button>` : ''}
                                    <button class="btn-sm" style="background:#e74c3c" onclick="secureAction('${id}', 'delete')">🗑️</button>
                                </div>
                            </div>`;
                    }
                });
            }
            card.innerHTML = `<div class="staff-header"><div><b>${name}</b><br><small>${staffData[name].role}</small></div><span class="stats-badge">${doneCount}/${total}</span></div>${tasksHtml}`;
            dashboard.appendChild(card);
        });
    }

    function addTask() {
        const from = document.getElementById('fromSelect').value;
        const pass = prompt(`${from} parolini kiriting:`);
        if (pass === staffData[from].pass) {
            const text = document.getElementById('taskInput').value;
            const owner = document.getElementById('staffSelect').value;
            if (!text.trim()) return;
            database.ref('tasks').push({
                owner: owner, from: from, priority: document.getElementById('prioritySelect').value,
                text: text, timestamp: Date.now(),
                startTime: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}), done: false
            });
            document.getElementById('taskInput').value = '';
            sendTelegram(`🆕 <b>Yangi vazifa!</b>\n👤 <b>Kimga:</b> ${owner}\n📝 <b>Vazifa:</b> ${text}`);
        } else alert("Parol xato!");
    }

    function secureAction(id, action, ownerName) {
        if (action === 'delete') {
            const pass = prompt("O'chirish paroli:");
            if (pass === "777" || pass === "555") database.ref('tasks/' + id).remove();
            else alert("Taqiqlangan!");
            return;
        }
        const pass = prompt(`${ownerName} parolini kiriting:`);
        if (pass === staffData[ownerName].pass) {
            const time = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            if (action === 'read') database.ref('tasks/' + id).update({ readTime: time });
            else if (action === 'finish') {
                const comment = prompt("Natija izohi:");
                if (comment) {
                    database.ref('tasks/' + id).update({ done: true, comment: comment, finishTime: time });
                    database.ref('tasks/' + id).once('value', s => {
                        sendTelegram(`✅ <b>Vazifa bajarildi!</b>\n👤 <b>Xodim:</b> ${ownerName}\n📝 <b>Vazifa:</b> ${s.val().text}\n💬 <b>Natija:</b> ${comment}`);
                    });
                }
            }
        } else alert("Parol xato!");
    }

    function clearAll() {
        const pass = prompt("Tozalash paroli:");
        if (pass === "777" || pass === "555") database.ref('tasks').remove();
    }
</script>
</body>
</html>
