<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>AKT Bo'limi | Smart Control System</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --success: #2ecc71; --danger: #e74c3c; --warning: #f1c40f; --light: #f8f9fa; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #e0e4e8; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); }
        h2 { text-align: center; color: var(--primary); border-bottom: 3px solid var(--accent); padding-bottom: 10px; margin-bottom: 25px; }

        .setup-area { display: grid; grid-template-columns: 1fr 1fr 1fr 2fr auto; gap: 10px; background: var(--light); padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #ddd; }
        select, input, .btn { padding: 10px; border-radius: 6px; border: 1px solid #ccc; font-size: 14px; outline: none; }
        .btn { cursor: pointer; border: none; font-weight: bold; color: white; transition: 0.3s; }
        .btn-add { background: var(--success); }

        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; }
        .staff-card { background: white; border-radius: 10px; padding: 15px; border-top: 5px solid var(--accent); box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .staff-header { display: flex; justify-content: space-between; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        
        .task-item { padding: 12px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #eee; transition: 0.3s; position: relative; }
        .priority-high { border-left: 8px solid var(--danger); background: #fff5f5; }
        .priority-mid { border-left: 8px solid var(--warning); background: #fffdf0; }
        .priority-low { border-left: 8px solid var(--success); background: #f5fff8; }

        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; background: #ffeb3b; } 100% { opacity: 1; } }
        .urgent-blink { animation: blink 1s infinite; border: 2px solid var(--danger); }

        .status-info { font-size: 11px; margin-top: 5px; border-top: 1px dashed #ddd; padding-top: 5px; }
        .comment-area { font-size: 12px; background: #d4edda; color: #155724; padding: 8px; border-radius: 4px; margin-top: 8px; }
        .task-link { color: var(--accent); text-decoration: underline; cursor: pointer; }
        .stats-badge { font-size: 10px; background: #eee; padding: 2px 6px; border-radius: 5px; color: #666; }
        
        .actions { display: flex; gap: 10px; margin-top: 10px; border-top: 1px solid #eee; padding-top: 8px; }
        .btn-sm { padding: 5px 10px; font-size: 12px; border-radius: 4px; cursor: pointer; border: none; color: white; }

        @media print { .setup-area, .actions, .btn-clear { display: none !important; } }
    </style>
</head>
<body>

<audio id="notifSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

<div class="container">
    <h2>🚀 AKT BO'LIMI: SMART CONTROL SYSTEM</h2>

    <div class="setup-area">
        <select id="staffSelect"></select>
        <select id="fromSelect">
            <option value="Hamrayev Omon">Hamrayev Omon (Boshliq)</option>
            <option value="Jumayev Nurbek">Jumayev Nurbek (Etakchi muhandis)</option>
        </select>
        <select id="prioritySelect">
            <option value="high">🔴 Shoshilinch</option>
            <option value="mid">🟡 O'rtacha</option>
            <option value="low">🟢 Oddiy</option>
        </select>
        <input type="text" id="taskInput" placeholder="Vazifa mazmuni yoki link...">
        <button class="btn btn-add" onclick="addTask()">Qo'shish +</button>
    </div>

    <div style="margin-bottom: 20px; display: flex; gap: 10px;">
        <button class="btn" style="background:var(--primary)" onclick="window.print()">🖨️ Chop etish</button>
        <button class="btn" style="background:var(--danger)" onclick="clearAll()">🗑️ Kunni tozalash</button>
    </div>

    <div id="dashboard" class="dashboard"></div>
</div>

<script>
    // FIREBASE CONFIG
    const firebaseConfig = {
        apiKey: "AIzaSyBuukb__qunhIE8270Tm_lYrUDA6z8gjp0",
        authDomain: "akt-bo-limi-vazifalari.firebaseapp.com",
        databaseURL: "https://akt-bo-limi-vazifalari-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "akt-bo-limi-vazifalari",
        storageBucket: "akt-bo-limi-vazifalari.firebasestorage.app",
        messagingSenderId: "906385201997",
        appId: "1:906385201997:web:4b4b13a9d0fa683bdaf504",
        measurementId: "G-CFB0L0E69C"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    const staffData = [
        { name: "Hamrayev Omon", role: "Bo'lim boshlig'i" },
        { name: "Jumayev Nurbek", role: "Etakchi muhandis" },
        { name: "Qosimov Elbek", role: "Dasturchi muhandis" },
        { name: "Xojibayev Javoxit", role: "Dasturchi muhandis" },
        { name: "Ismoilov Xasan", role: "Dasturchi muhandis" },
        { name: "Xo'jamqulov Baxtiyor", role: "Muhandis" },
        { name: "Ismatov Temur", role: "Muhandis" }
    ];

    const staffSelect = document.getElementById('staffSelect');
    staffData.forEach(s => {
        let opt = document.createElement('option');
        opt.value = s.name; opt.innerText = "Kimga: " + s.name;
        staffSelect.appendChild(opt);
    });

    let firstLoad = true;
    database.ref('tasks').on('value', (snapshot) => {
        const data = snapshot.val();
        if (!firstLoad && data) {
            document.getElementById('notifSound').play().catch(e => console.log("Ovoz bloklandi"));
        }
        render(data);
        firstLoad = false;
    });

    function linkify(text) {
        const urlRegex = /(https?:\/\/[^\s]+)/g;
        return text.replace(urlRegex, (url) => `<a href="${url}" target="_blank" class="task-link">${url}</a>`);
    }

    function render(data) {
        const dashboard = document.getElementById('dashboard');
        dashboard.innerHTML = '';
        const now = Date.now();
        
        staffData.forEach(staff => {
            const card = document.createElement('div');
            card.className = 'staff-card';
            let tasksHtml = '';
            let total = 0, doneCount = 0;

            if (data) {
                Object.keys(data).forEach(id => {
                    const t = data[id];
                    if (t.owner === staff.name) {
                        total++; if(t.done) doneCount++;
                        const isLate = !t.readTime && !t.done && (now - t.timestamp > 1800000);

                        tasksHtml += `
                            <div class="task-item priority-${t.priority} ${t.done ? 'completed' : ''} ${isLate ? 'urgent-blink' : ''}">
                                <div class="task-meta">
                                    <span>📤 <b>Kimdan:</b> ${t.from}</span>
                                    <span>⏰ <b>Berildi:</b> ${t.startTime}</span>
                                </div>
                                <span class="task-text">${linkify(t.text)}</span>
                                <div class="status-info">
                                    ${t.readTime ? `<span style="color:#3498db">👁️ <b>O'qildi:</b> ${t.readTime}</span>` : '<span style="color:red">🌑 Yangi</span>'}
                                    ${t.done ? `<br><span style="color:#27ae60">✅ <b>Bajarildi:</b> ${t.finishTime}</span>` : ''}
                                </div>
                                ${t.comment ? `<div class="comment-area"><b>Natija:</b> ${t.comment}</div>` : ''}
                                <div class="actions">
                                    ${!t.readTime ? `<button class="btn-sm" style="background:#3498db" onclick="updateTask('${id}', {readTime: '${new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}'})">O'qidim</button>` : ''}
                                    ${t.readTime && !t.done ? `<button class="btn-sm" style="background:#2ecc71" onclick="finishTask('${id}')">Bajarildi</button>` : ''}
                                    <button class="btn-sm" style="background:#e74c3c" onclick="deleteTask('${id}')">🗑️</button>
                                </div>
                            </div>`;
                    }
                });
            }
            card.innerHTML = `
                <div class="staff-header">
                    <div><b>${staff.name}</b><br><small>${staff.role}</small></div>
                    <span class="stats-badge">${doneCount}/${total}</span>
                </div>
                <div>${tasksHtml || '<small style="color:#ccc">Bo\'sh</small>'}</div>`;
            dashboard.appendChild(card);
        });
    }

    function addTask() {
        const text = document.getElementById('taskInput').value;
        if (!text.trim()) return;
        database.ref('tasks').push({
            owner: document.getElementById('staffSelect').value,
            from: document.getElementById('fromSelect').value,
            priority: document.getElementById('prioritySelect').value,
            text: text,
            timestamp: Date.now(),
            startTime: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
            done: false, readTime: '', finishTime: '', comment: ''
        });
        document.getElementById('taskInput').value = '';
    }

    function updateTask(id, obj) { database.ref('tasks/' + id).update(obj); }

    function finishTask(id) {
        const comment = prompt("Natija haqida izoh:");
        if (comment) database.ref('tasks/' + id).update({ 
            done: true, 
            comment: comment, 
            finishTime: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) 
        });
    }

    // ВАЗИФАНИ ЎЧИРИШ (ҲИМОЯЛАНГАН)
    function deleteTask(id) {
        const accessKeys = { "777": "Hamrayev Omon", "555": "Jumayev Nurbek" };
        const pass = prompt("Vazifani o'chirish uchun rahbar parolini kiring:");
        if (pass === null) return;
        if (accessKeys[pass]) {
            if(confirm("Ushbu vazifani o'chirib tashlaysizmi?")) database.ref('tasks/' + id).remove();
        } else {
            alert("Xato parol! O'chirish taqiqlanadi.");
        }
    }

    // КУННИ ТОЗАЛАШ (ҲИМОЯЛАНГАН)
    function clearAll() {
        const accessKeys = { "777": "Hamrayev Omon", "555": "Jumayev Nurbek" };
        const pass = prompt("Barcha vazifalarni o'chirish uchun parolni kiriting:");
        if (pass === null) return;
        if (accessKeys[pass]) {
            if(confirm("Haqiqatdan ham barcha vazifalarni o'chirmoqchimisiz?")) database.ref('tasks').remove();
        } else {
            alert("Xato parol!");
        }
    }
</script>
</body>
</html>
